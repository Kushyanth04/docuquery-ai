version: '3.8'

services:
  # ===== Backend (FastAPI) =====
  backend:
    build: ./backend
    container_name: docuquery-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ===== Redis (Caching) =====
  redis:
    image: redis:7-alpine
    container_name: docuquery-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===== Frontend (React + Vite) =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docuquery-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    command: npm run dev -- --host
    restart: unless-stopped

volumes:
  redis_data:
